    <style>
        .menu-container {
            min-height: 100vh;
            background: var(--deep-navy);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
        }

        .menu-content {
            text-align: center;
            max-width: 500px;
        }

        .menu-content h1 {
            font-size: 2.5rem;
            color: var(--gold-light);
            margin-bottom: 3rem;
            font-family: var(--font-display);
            letter-spacing: 2px;
        }

        .menu-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .menu-links li {
            transform: scale(1);
            transition: transform 0.3s ease;
        }

        .menu-links li:hover {
            transform: scale(1.05);
        }

        .menu-links a {
            font-size: 1.3rem;
            color: var(--text-light);
            font-family: var(--font-heading);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 1rem 2rem;
            border: 2px solid var(--border-gold);
            border-radius: 8px;
            display: block;
            transition: all 0.3s ease;
        }

        .menu-links a:hover {
            background: var(--gold-primary);
            color: var(--text-dark);
            border-color: var(--gold-primary);
            box-shadow: 0 8px 25px rgba(200, 150, 12, 0.3);
        }

        .menu-links a.active {
            background: var(--gold-primary);
            color: var(--text-dark);
            border-color: var(--gold-primary);
        }

        .back-link {
            position: fixed;
            top: 2rem;
            left: 2rem;
            font-size: 1.5rem;
            color: var(--gold-light);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 9999;
        }

        .back-link:hover {
            color: var(--gold-primary);
            transform: scale(1.1);
        }

        @media (max-width: 480px) {
            .menu-content h1 {
                font-size: 1.8rem;
                margin-bottom: 2rem;
            }

            .menu-links a {
                font-size: 1.1rem;
                padding: 0.75rem 1.5rem;
            }

            .back-link {
                top: 1rem;
                left: 1rem;
            }
        }
    </style>
</head>
